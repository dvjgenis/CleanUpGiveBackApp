<!DOCTYPE html><html lang="en"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>Photo Submitted — Clean-Up Give Back</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Sanchez:wght@400;600;700&family=Noto+Sans:wght@400;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
<script id="tailwind-config">
tailwind.config = {
  darkMode: "class",
  theme: {
    extend: {
      colors: {
        "primary": "#009540", "on-primary": "#ffffff", "primary-container": "#008739",
        "on-primary-container": "#f7fff2", "primary-fixed-dim": "#66de7f",
        "secondary": "#835400", "on-secondary": "#ffffff", "secondary-container": "#fcab29",
        "error": "#ba1a1a", "on-error": "#ffffff",
        "surface": "#fcf9f8", "on-surface": "#1c1b1b",
        "on-surface-variant": "#3e4a3d", "surface-container-lowest": "#ffffff",
        "surface-container-low": "#f6f3f2", "surface-container": "#f0edec",
        "outline": "#6e7a6c", "outline-variant": "#bdcaba",
        "background": "#fcf9f8", "on-background": "#1c1b1b"
      },
      fontFamily: {
        "headline": ["Sanchez","serif"],
        "body": ["Noto Sans","sans-serif"],
        "label": ["Noto Sans","sans-serif"],
        "data": ["JetBrains Mono","monospace"]
      },
      fontSize: {
        "display-lg": ["34px",{lineHeight:"40px",letterSpacing:"-0.02em",fontWeight:"700"}],
        "headline-sm": ["20px",{lineHeight:"28px",fontWeight:"600"}],
        "body-md": ["16px",{lineHeight:"24px",fontWeight:"400"}],
        "label-md": ["14px",{lineHeight:"20px",letterSpacing:"0.01em",fontWeight:"600"}]
      }
    }
  }
}
</script>
<style>
body { font-family: 'Noto Sans', sans-serif; min-height: max(884px, 100dvh); }
.material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }

@keyframes fade-in-up {
  0% { opacity: 0; transform: translateY(16px); }
  100% { opacity: 1; transform: translateY(0); }
}
@keyframes pop-in {
  0% { opacity: 0; transform: scale(0.7); }
  70% { transform: scale(1.08); }
  100% { opacity: 1; transform: scale(1); }
}
.animate-pop { animation: pop-in 0.45s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }
.animate-fade-up { animation: fade-in-up 0.5s cubic-bezier(0.16,1,0.3,1) forwards; }
.delay-200 { animation-delay: 200ms; opacity: 0; }
.delay-300 { animation-delay: 300ms; opacity: 0; }
.delay-400 { animation-delay: 400ms; opacity: 0; }

.btn-track {
  transition: transform 140ms cubic-bezier(0.23,1,0.32,1), background-color 140ms ease, box-shadow 140ms ease;
}
.btn-track:active { transform: scale(0.97); }
@media (hover: hover) and (pointer: fine) {
  .btn-track:hover { background-color: #005320; box-shadow: 0 4px 12px rgba(0,149,64,0.3); }
}
</style>
</head>
<body class="bg-background text-on-background font-body min-h-screen flex flex-col items-center justify-center p-8 antialiased">

<div class="w-full max-w-sm flex flex-col items-center text-center">

  <!-- Animated checkmark -->
  <div class="w-20 h-20 rounded-full bg-primary flex items-center justify-center mb-6 shadow-lg animate-pop">
    <span class="material-symbols-outlined text-on-primary text-[40px]" style="font-variation-settings:'FILL' 1;">check</span>
  </div>

  <!-- Headline -->
  <h1 class="font-headline text-display-lg text-on-background mb-3 animate-fade-up delay-200">Photo Submitted</h1>

  <!-- Body -->
  <p class="font-body text-body-md text-on-surface-variant mb-3 leading-relaxed animate-fade-up delay-200">
    Your progress photo has been recorded. Keep up the great work!
  </p>

  <!-- Next photo timer -->
  <div class="flex items-center gap-2 mb-10 animate-fade-up delay-300">
    <div class="flex items-center gap-1.5 bg-surface-container-low border border-outline-variant rounded-full px-4 py-1.5">
      <span class="material-symbols-outlined text-primary text-[16px]" style="font-variation-settings:'FILL' 1;">schedule</span>
      <span class="font-data text-[13px] font-medium text-on-surface" style="font-family:'JetBrains Mono',monospace;">Next photo in 30:00</span>
    </div>
  </div>

  <!-- CTA -->
  <button id="btn-continue" class="btn-track w-full bg-primary text-on-primary font-label text-label-md py-4 rounded-xl flex justify-center items-center gap-2 shadow-md focus:outline-none focus:ring-2 focus:ring-primary/50 animate-fade-up delay-400">
    <span class="material-symbols-outlined text-[20px]" style="font-variation-settings:'FILL' 1;">directions_run</span>
    Continue Tracking
  </button>

</div>

<script>
document.getElementById('btn-continue').addEventListener('click', function() {
  window.location.href = 'live_session___refined_map_tracker.html';
});
</script>
</body></html>
