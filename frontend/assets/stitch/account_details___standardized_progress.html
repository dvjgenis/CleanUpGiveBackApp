<!DOCTYPE html><html lang="en"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>A Few Details - Clean-Up Give Back</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com" rel="preconnect">
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Noto+Sans:wght@400;600&family=Sanchez:wght@400;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
<script id="tailwind-config">
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        colors: {
          "primary": "#009540", "on-primary": "#ffffff", "primary-container": "#008739",
          "on-primary-container": "#f7fff2", "secondary": "#835400", "on-secondary": "#ffffff",
          "secondary-container": "#fcab29", "on-secondary-container": "#694300",
          "tertiary": "#a62f51", "on-tertiary": "#ffffff", "tertiary-container": "#c64869",
          "on-tertiary-container": "#fffbff", "error": "#ba1a1a", "on-error": "#ffffff",
          "error-container": "#ffdad6", "on-error-container": "#93000a",
          "background": "#fcf9f8", "on-background": "#1c1b1b",
          "surface": "#fcf9f8", "on-surface": "#1c1b1b",
          "surface-variant": "#e5e2e1", "on-surface-variant": "#3e4a3d",
          "surface-container-lowest": "#ffffff", "surface-container-low": "#f6f3f2",
          "surface-container": "#f0edec", "surface-container-high": "#eae7e7",
          "surface-container-highest": "#e5e2e1", "surface-dim": "#dcd9d9",
          "surface-bright": "#fcf9f8", "surface-tint": "#006e2d",
          "outline": "#6e7a6c", "outline-variant": "#bdcaba",
          "inverse-surface": "#313030", "inverse-on-surface": "#f3f0ef",
          "inverse-primary": "#66de7f"
        },
        borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
        spacing: { "margin-side": "24px", "stack-sm": "8px", "stack-md": "16px", "stack-lg": "32px" },
        fontFamily: { "headline": ["Sanchez"], "display": ["Sanchez"], "body": ["Noto Sans"], "label": ["Noto Sans"], "data": ["JetBrains Mono"] },
        fontSize: {
          "display-lg": ["34px", { lineHeight: "40px", letterSpacing: "-0.02em", fontWeight: "700" }],
          "headline-md": ["24px", { lineHeight: "32px", fontWeight: "600" }],
          "body-md": ["16px", { lineHeight: "24px", fontWeight: "400" }],
          "label-md": ["14px", { lineHeight: "20px", letterSpacing: "0.01em", fontWeight: "600" }]
        }
      }
    }
  }
</script>
<style>
  .material-symbols-outlined { font-family: 'Material Symbols Outlined'; font-weight: normal; font-style: normal; font-size: 24px; line-height: 1; letter-spacing: normal; text-transform: none; display: inline-block; white-space: nowrap; direction: ltr; -webkit-font-smoothing: antialiased; }
  body { min-height: max(884px, 100dvh); }
</style>
</head>
<body class="bg-background text-on-background font-body min-h-screen flex flex-col items-center selection:bg-primary-container selection:text-on-primary-container">
<main class="w-full max-w-md px-margin-side pt-12 pb-8 flex flex-col grow">

  <!-- Progress Indicator (Step 2 of 3) -->
  <div class="flex gap-2 w-full items-center mb-10">
    <div aria-label="Step 1 completed" class="h-2 flex-1 bg-primary rounded-full transition-all duration-300"></div>
    <div aria-label="Step 2 active" class="h-2 flex-1 bg-primary rounded-full transition-all duration-300"></div>
    <div aria-label="Step 3 pending" class="h-2 flex-1 bg-surface-variant rounded-full transition-all duration-300"></div>
  </div>

  <!-- Header -->
  <div class="mb-10">
    <h1 class="font-headline text-display-lg text-on-surface">A few details</h1>
    <p class="font-body text-body-md text-on-surface-variant mt-2">Help us tailor your clean-up experience.</p>
  </div>

  <!-- Form -->
  <div class="flex flex-col gap-8 w-full flex-grow">

    <!-- Age Field -->
    <div class="flex flex-col gap-2">
      <label class="font-label text-label-md text-on-surface" for="age">Age</label>
      <div class="relative">
        <input class="w-full bg-surface border border-outline-variant rounded-lg px-4 py-3 pr-12 font-body text-body-md text-on-surface placeholder:text-on-surface-variant focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all shadow-sm" id="age" inputmode="numeric" max="120" min="13" name="age" placeholder="e.g. 25" type="number">
        <div class="absolute right-3 top-1/2 -translate-y-1/2 text-on-surface-variant pointer-events-none">
          <span class="material-symbols-outlined">cake</span>
        </div>
      </div>
      <p class="font-body text-[12px] text-on-surface-variant">You must be at least 13 years old to participate independently.</p>
    </div>

    <!-- Court-Ordered Service -->
    <div class="flex flex-col gap-3">
      <label class="font-label text-label-md text-on-surface">Are you completing court-ordered service hours?</label>
      <div class="grid grid-cols-2 gap-3">
        <button class="w-full py-3 px-4 rounded-lg border border-outline-variant text-on-surface font-label text-label-md transition-all hover:bg-surface-container active:scale-[0.97]" id="btnYes" onclick="selectCourtOrdered('yes')" type="button">Yes</button>
        <button class="w-full py-3 px-4 rounded-lg border border-primary bg-primary text-on-primary font-label text-label-md transition-all shadow-sm active:scale-[0.97]" id="btnNo" onclick="selectCourtOrdered('no')" type="button">No</button>
      </div>
      <input id="courtOrderedValue" name="court_ordered" type="hidden" value="no">
      <div class="hidden p-4 bg-surface-container rounded-lg border border-outline-variant" id="courtOrderedInfo">
        <div class="flex items-start gap-3">
          <span class="material-symbols-outlined text-on-surface-variant mt-0.5 text-[20px]">info</span>
          <p class="font-body text-[14px] text-on-surface-variant leading-relaxed">You will need to provide verification documentation from your caseworker or court liaison in the next step.</p>
        </div>
      </div>
    </div>

    <!-- Spacer -->
    <div class="flex-grow"></div>

    <!-- Buttons -->
    <div class="flex gap-4 mt-4">
      <button class="flex-1 bg-surface-container text-on-surface rounded-lg py-4 px-6 font-label text-label-md shadow-sm hover:bg-surface-container-high transition-all flex items-center justify-center active:scale-[0.97]" type="button">
        Previous
      </button>
      <button class="flex-1 bg-primary text-on-primary rounded-lg py-4 px-6 font-label text-label-md shadow-sm hover:opacity-90 transition-all flex items-center justify-center active:scale-[0.97]" type="button">
        Continue
      </button>
    </div>
  </div>
</main>
<script>
  function selectCourtOrdered(value) {
    const btnYes = document.getElementById('btnYes');
    const btnNo = document.getElementById('btnNo');
    const infoBox = document.getElementById('courtOrderedInfo');
    document.getElementById('courtOrderedValue').value = value;
    const activeClass = 'w-full py-3 px-4 rounded-lg border border-primary bg-primary text-on-primary font-label text-label-md transition-all shadow-sm active:scale-[0.97]';
    const inactiveClass = 'w-full py-3 px-4 rounded-lg border border-outline-variant text-on-surface font-label text-label-md transition-all hover:bg-surface-container active:scale-[0.97]';
    btnYes.className = value === 'yes' ? activeClass : inactiveClass;
    btnNo.className = value === 'no' ? activeClass : inactiveClass;
    value === 'yes' ? infoBox.classList.remove('hidden') : infoBox.classList.add('hidden');
  }
</script>
</body></html>
