<!DOCTYPE html><html class="light" lang="en"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" name="viewport">
<title>Account Details</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Sanchez:wght@400;600;700&family=Noto+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
<script id="tailwind-config">
tailwind.config = {
  darkMode: "class",
  theme: {
    extend: {
      colors: {
        "primary": "#009540",
        "on-primary": "#ffffff",
        "primary-container": "#008739",
        "on-primary-container": "#f7fff2",
        "error": "#ba1a1a",
        "surface": "#fcf9f8",
        "on-surface": "#1c1b1b",
        "surface-variant": "#e5e2e1",
        "on-surface-variant": "#3e4a3d",
        "surface-container-lowest": "#ffffff",
        "surface-container-low": "#f6f3f2",
        "surface-container": "#f0edec",
        "surface-container-high": "#eae7e7",
        "outline": "#6e7a6c",
        "outline-variant": "#bdcaba",
        "background": "#fcf9f8",
        "on-background": "#1c1b1b"
      },
      borderRadius: {
        "DEFAULT": "0.5rem",
        "sm": "0.25rem",
        "md": "0.75rem",
        "lg": "1rem",
        "xl": "1.5rem",
        "full": "9999px"
      },
      fontFamily: {
        "headline": ["Sanchez", "serif"],
        "body": ["Noto Sans", "sans-serif"],
        "label": ["Noto Sans", "sans-serif"],
        "data": ["JetBrains Mono", "monospace"]
      }
    }
  }
}
</script>
<style>
  body { font-family: 'Noto Sans', sans-serif; min-height: max(884px, 100dvh); }
  h1, h2, h3, h4, h5, h6, .font-headline { font-family: 'Sanchez', serif; }

  /* Custom dropdown */
  .custom-dropdown { position: relative; user-select: none; -webkit-user-select: none; }

  .dropdown-trigger {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    background: #fcf9f8;
    border: 1px solid #bdcaba;
    border-radius: 0.5rem;
    font-family: 'Noto Sans', sans-serif;
    font-size: 16px;
    line-height: 24px;
    color: #1c1b1b;
    cursor: pointer;
    transition: border-color 150ms, box-shadow 150ms;
    -webkit-tap-highlight-color: transparent;
  }
  .dropdown-trigger.placeholder { color: #6e7a6c; }
  .dropdown-trigger:focus { outline: none; border-color: #009540; box-shadow: 0 0 0 3px rgba(0,149,64,0.15); }
  .dropdown-trigger.open { border-color: #009540; box-shadow: 0 0 0 3px rgba(0,149,64,0.15); }

  .dropdown-chevron {
    font-size: 20px;
    color: #6e7a6c;
    transition: transform 200ms ease;
    flex-shrink: 0;
  }
  .dropdown-trigger.open .dropdown-chevron { transform: rotate(180deg); }

  .dropdown-menu {
    display: none;
    position: absolute;
    top: calc(100% + 4px);
    left: 0; right: 0;
    background: #ffffff;
    border: 1px solid #bdcaba;
    border-radius: 0.5rem;
    box-shadow: 0 4px 16px rgba(0,0,0,0.10);
    z-index: 100;
    overflow: hidden;
  }
  .dropdown-menu.open { display: block; }

  .dropdown-option {
    padding: 14px 16px;
    font-family: 'Noto Sans', sans-serif;
    font-size: 16px;
    color: #1c1b1b;
    cursor: pointer;
    transition: background 120ms;
    -webkit-tap-highlight-color: transparent;
  }
  .dropdown-option:not(:last-child) { border-bottom: 1px solid #f0edec; }
  .dropdown-option:active { background: #f0edec; }
  .dropdown-option.selected { color: #009540; font-weight: 600; }
  @media (hover: hover) {
    .dropdown-option:hover { background: #f6f3f2; }
  }
</style>
</head>
<body class="bg-background text-on-background font-body min-h-screen flex flex-col items-center selection:bg-primary-container selection:text-on-primary-container">

<main class="w-full max-w-md px-6 pt-12 pb-8 flex flex-col grow">

  <!-- Progress Pills -->
  <div class="flex flex-col gap-8 mb-8">
    <div class="flex gap-2 w-full items-center">
      <div aria-label="Step 1 completed" class="h-2 flex-1 bg-primary rounded-full transition-all duration-300"></div>
      <div aria-label="Step 2 active" class="h-2 flex-1 bg-primary rounded-full transition-all duration-300"></div>
      <div aria-label="Step 3 pending" class="h-2 flex-1 bg-surface-variant rounded-full transition-all duration-300"></div>
    </div>
  </div>

  <!-- Header -->
  <div class="mb-10">
    <h1 class="font-headline text-[24px] font-semibold leading-[32px] text-on-surface mb-2">A few details</h1>
    <p class="font-body text-[16px] text-on-surface-variant leading-[24px]">We need this information to help tailor your clean-up experience and verify your impact.</p>
  </div>

  <!-- Form -->
  <form action="#" class="flex-1 flex flex-col gap-6" id="detailsForm" method="POST">
    <div class="flex flex-col gap-6 flex-1">

      <!-- Age Range -->
      <div class="flex flex-col gap-2">
        <label class="font-label text-[14px] font-semibold text-on-surface" id="age-label">Age Range</label>
        <div class="custom-dropdown" id="age-dropdown" role="combobox" aria-labelledby="age-label" aria-expanded="false">
          <button type="button" class="dropdown-trigger placeholder" id="age-trigger" aria-haspopup="listbox">
            <span id="age-value">Select your age range</span>
            <span class="material-symbols-outlined dropdown-chevron">expand_more</span>
          </button>
          <div class="dropdown-menu" id="age-menu" role="listbox" aria-labelledby="age-label">
            <div class="dropdown-option" role="option" data-value="under-12">Under 12</div>
            <div class="dropdown-option" role="option" data-value="13-18">13–18</div>
            <div class="dropdown-option" role="option" data-value="18-above">18 and above</div>
          </div>
          <input type="hidden" name="age_range" id="age-hidden" required>
        </div>
      </div>

      <!-- Service Type -->
      <div class="flex flex-col gap-2">
        <label class="font-label text-[14px] font-semibold text-on-surface" id="service-label">Service Type</label>
        <div class="custom-dropdown" id="service-dropdown" role="combobox" aria-labelledby="service-label" aria-expanded="false">
          <button type="button" class="dropdown-trigger placeholder" id="service-trigger" aria-haspopup="listbox">
            <span id="service-value">Select service type</span>
            <span class="material-symbols-outlined dropdown-chevron">expand_more</span>
          </button>
          <div class="dropdown-menu" id="service-menu" role="listbox" aria-labelledby="service-label">
            <div class="dropdown-option" role="option" data-value="court-ordered">Court-ordered</div>
            <div class="dropdown-option" role="option" data-value="school">School</div>
            <div class="dropdown-option" role="option" data-value="volunteering">Volunteering</div>
          </div>
          <input type="hidden" name="service_type" id="service-hidden" required>
        </div>
      </div>

    </div>

    <!-- Buttons -->
    <div class="flex gap-4 mt-4">
      <button class="flex-1 bg-surface-container text-on-surface rounded-lg py-4 px-6 font-label text-[14px] font-semibold shadow-sm hover:bg-surface-container-high transition-all flex items-center justify-center active:scale-[0.97]" type="button" id="btn-previous">
        Previous
      </button>
      <button class="flex-1 bg-primary text-on-primary rounded-lg py-4 px-6 font-label text-[14px] font-semibold shadow-sm hover:opacity-90 transition-all flex items-center justify-center active:scale-[0.97]" type="submit">
        Continue
      </button>
    </div>
  </form>

</main>

<script>
(function() {
  function initDropdown(triggerId, menuId, valueId, hiddenId, dropdownId) {
    var trigger  = document.getElementById(triggerId);
    var menu     = document.getElementById(menuId);
    var valueEl  = document.getElementById(valueId);
    var hidden   = document.getElementById(hiddenId);
    var dropdown = document.getElementById(dropdownId);
    var isOpen   = false;

    function open() {
      isOpen = true;
      trigger.classList.add('open');
      trigger.classList.remove('placeholder');
      if (!hidden.value) trigger.classList.add('placeholder');
      menu.classList.add('open');
      dropdown.setAttribute('aria-expanded', 'true');
    }
    function close() {
      isOpen = false;
      trigger.classList.remove('open');
      menu.classList.remove('open');
      dropdown.setAttribute('aria-expanded', 'false');
    }
    function toggle() { isOpen ? close() : open(); }

    trigger.addEventListener('click', function(e) {
      e.preventDefault();
      e.stopPropagation();
      // Close any other open dropdown first
      document.querySelectorAll('.dropdown-menu.open').forEach(function(m) {
        if (m !== menu) {
          m.classList.remove('open');
          m.previousElementSibling && m.previousElementSibling.classList.remove('open');
        }
      });
      toggle();
    });

    menu.querySelectorAll('.dropdown-option').forEach(function(opt) {
      opt.addEventListener('click', function(e) {
        e.stopPropagation();
        var val   = opt.getAttribute('data-value');
        var label = opt.textContent.trim();

        // Update display
        valueEl.textContent = label;
        hidden.value = val;

        // Styling
        trigger.classList.remove('placeholder');
        menu.querySelectorAll('.dropdown-option').forEach(function(o) { o.classList.remove('selected'); });
        opt.classList.add('selected');

        close();
      });
    });
  }

  initDropdown('age-trigger',     'age-menu',     'age-value',     'age-hidden',     'age-dropdown');
  initDropdown('service-trigger', 'service-menu', 'service-value', 'service-hidden', 'service-dropdown');

  // Close dropdowns on outside tap
  document.addEventListener('click', function() {
    document.querySelectorAll('.dropdown-menu.open').forEach(function(m) {
      m.classList.remove('open');
    });
    document.querySelectorAll('.dropdown-trigger.open').forEach(function(t) {
      t.classList.remove('open');
    });
  });

  document.getElementById('detailsForm').addEventListener('submit', function(e) {
    e.preventDefault();
  });
})();
</script>
</body></html>
