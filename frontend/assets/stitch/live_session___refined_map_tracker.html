<style>
        .map-bg {
            background-color: #1c1b1b;
            background-image: radial-gradient(circle at center, #313030 0%, #1c1b1b 100%);
            background-size: cover;
            background-position: center;
        }
        .pulse {
            animation: pulse-animation 2s infinite;
        }
        @keyframes pulse-animation {
            0% { box-shadow: 0 0 0 0 rgba(0, 107, 44, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(0, 107, 44, 0); }
            100% { box-shadow: 0 0 0 0 rgba(0, 107, 44, 0); }
        }
        /* Topographic line simulation */
        .topo-lines {
            position: absolute;
            inset: 0;
            opacity: 0.15;
            background-image: repeating-radial-gradient(
                circle at 50% 50%,
                transparent 0,
                transparent 40px,
                #ffffff 40px,
                #ffffff 41px
            ),
            repeating-radial-gradient(
                circle at 80% 20%,
                transparent 0,
                transparent 60px,
                #ffffff 60px,
                #ffffff 61px
            );
            pointer-events: none;
        }
        .route-line {
            position: absolute;
            top: 40%;
            left: 20%;
            width: 60%;
            height: 40%;
            border-left: 4px solid #009540;
            border-bottom: 4px solid #009540;
            border-bottom-left-radius: 24px;
            transform: skew(-15deg) rotate(-10deg);
            filter: drop-shadow(0 0 8px rgba(0, 107, 44, 0.5));
        }
        .user-location {
            position: absolute;
            top: 80%;
            left: 80%;
            width: 16px;
            height: 16px;
            background-color: #009540;
            border: 3px solid #ffffff;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
        }
    </style>

<div class="flex-grow"></div> <!-- Spacer -->
<!-- Bottom Control Panel -->
<div class="w-full max-w-md mx-auto space-y-4">
<!-- Checkpoint Card -->
<div class="bg-surface rounded-xl p-5 border border-outline-variant/50 shadow-lg relative overflow-hidden">
<div class="flex justify-between items-center mb-4"><div><h3 class="font-headline font-headline-sm text-on-surface">Checkpoint Photo</h3></div><div class="flex gap-2"><div class="w-8 h-2 rounded-full bg-primary"></div><div class="w-8 h-2 rounded-full bg-surface-dim"></div><div class="w-8 h-2 rounded-full bg-surface-dim"></div></div></div><div class="mb-4"><p class="font-body font-body-md text-on-surface-variant flex items-center gap-2">Next photo due in: <span id="photo-timer" class="font-data font-data-sm font-medium text-on-primary-fixed">30:00</span></p></div>

<div class="h-1.5 w-full bg-surface-container-high rounded-full overflow-hidden">

</div>
</div>

<span class="material-symbols-outlined">photo_camera</span>
                    Submit Photo
                </button>

<span class="material-symbols-outlined">stop_circle</span>
                    End Session
                </button>

<button aria-label="Map Layers" class="w-12 h-12 rounded-full bg-surface/90 backdrop-blur-md border border-outline-variant flex items-center justify-center text-on-surface hover:bg-surface-container-low transition-colors shadow-lg">
<span class="material-symbols-outlined">layers</span>
</button>
<button aria-label="Center Location" class="w-12 h-12 rounded-full bg-surface/90 backdrop-blur-md border border-outline-variant flex items-center justify-center text-on-surface hover:bg-surface-container-low transition-colors shadow-lg">
<span class="material-symbols-outlined">my_location</span>
</button>
</div>
<script>
        // Stopwatch logic
        let sessionSecs = 0;
        let sessionMins = 0;
        let sessionHours = 0;
        
        // Countdown logic
        let photoSecs = 0;
        let photoMins = 30;

        setInterval(() => {
            // Stopwatch update
            sessionSecs++;
            if(sessionSecs >= 60) {
                sessionSecs = 0;
                sessionMins++;
            }
            if(sessionMins >= 60) {
                sessionMins = 0;
                sessionHours++;
            }
            const sessionDisplay = `${sessionHours.toString().padStart(2, '0')}:${sessionMins.toString().padStart(2, '0')}:${sessionSecs.toString().padStart(2, '0')}`;
            document.getElementById('session-timer').textContent = sessionDisplay;
            
            // Countdown update
            if(photoSecs === 0 && photoMins === 0) {
                // Stay at 00:00
            } else {
                if(photoSecs === 0) {
                    photoSecs = 59;
                    photoMins--;
                } else {
                    photoSecs--;
                }
                const photoDisplay = `${photoMins.toString().padStart(2, '0')}:${photoSecs.toString().padStart(2, '0')}`;
                document.getElementById('photo-timer').textContent = photoDisplay;
            }
        }, 1000);
    </script>
