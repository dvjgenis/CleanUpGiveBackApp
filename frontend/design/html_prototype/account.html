<!DOCTYPE html><html lang="en"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>Account Management</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Sanchez:wght@400;600;700&amp;family=Noto+Sans:wght@400;600&amp;family=JetBrains+Mono:wght@400;500&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "error": "#ba1a1a",
                        "secondary": "#835400",
                        "on-tertiary": "#ffffff",
                        "tertiary-container": "#c64869",
                        "on-primary-fixed": "#002109",
                        "inverse-surface": "#313030",
                        "tertiary-fixed-dim": "#ffb2bf",
                        "primary-fixed": "#83fb98",
                        "surface-variant": "#e5e2e1",
                        "on-tertiary-fixed-variant": "#89173c",
                        "surface-container-low": "#f6f3f2",
                        "secondary-fixed": "#ffddb5",
                        "on-secondary": "#ffffff",
                        "secondary-container": "#fcab29",
                        "on-background": "#1c1b1b",
                        "on-secondary-container": "#694300",
                        "on-primary-container": "#f7fff2",
                        "on-primary": "#ffffff",
                        "inverse-on-surface": "#f3f0ef",
                        "error-container": "#ffdad6",
                        "on-surface": "#1c1b1b",
                        "primary-fixed-dim": "#66de7f",
                        "on-tertiary-fixed": "#3f0016",
                        "outline": "#6e7a6c",
                        "tertiary-fixed": "#ffd9de",
                        "inverse-primary": "#66de7f",
                        "outline-variant": "#bdcaba",
                        "on-error-container": "#93000a",
                        "surface-dim": "#dcd9d9",
                        "surface": "#fcf9f8",
                        "surface-container-highest": "#e5e2e1",
                        "surface-container-high": "#eae7e7",
                        "background": "#fcf9f8",
                        "surface-tint": "#006e2d",
                        "on-tertiary-container": "#fffbff",
                        "tertiary": "#a62f51",
                        "on-error": "#ffffff",
                        "primary": "#006b2c",
                        "surface-container": "#f0edec",
                        "on-surface-variant": "#3e4a3d",
                        "on-secondary-fixed-variant": "#643f00",
                        "on-primary-fixed-variant": "#005320",
                        "secondary-fixed-dim": "#ffb957",
                        "on-secondary-fixed": "#2a1800",
                        "surface-container-lowest": "#ffffff",
                        "surface-bright": "#fcf9f8",
                        "primary-container": "#008739"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.5rem",
                        "sm": "0.25rem",
                        "md": "0.75rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Sanchez", "serif"],
                        "display": ["Sanchez", "serif"],
                        "body": ["Noto Sans", "sans-serif"],
                        "label": ["Noto Sans", "sans-serif"],
                        "data-lg": ["JetBrains Mono", "monospace"],
                        "data-sm": ["JetBrains Mono", "monospace"]
                    },
                    "fontSize": {
                        "display-lg": ["34px", { lineHeight: "40px", letterSpacing: "-0.02em", fontWeight: "700" }],
                        "headline-md": ["24px", { lineHeight: "32px", fontWeight: "600" }],
                        "headline-sm": ["20px", { lineHeight: "28px", fontWeight: "600" }],
                        "body-lg": ["18px", { lineHeight: "28px", fontWeight: "400" }],
                        "body-md": ["16px", { lineHeight: "24px", fontWeight: "400" }],
                        "label-md": ["14px", { lineHeight: "20px", letterSpacing: "0.01em", fontWeight: "600" }],
                        "data-lg": ["28px", { lineHeight: "32px", letterSpacing: "-0.05em", fontWeight: "500" }],
                        "data-sm": ["14px", { lineHeight: "20px", fontWeight: "400" }]
                    }
                }
            }
        }
    </script>
<style>
        body { font-family: 'Noto Sans', sans-serif; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background h-screen flex flex-col font-body antialiased selection:bg-primary-container selection:text-on-primary-container">
<!-- TopAppBar -->
<header class="docked full-width top-0 bg-surface dark:bg-on-background text-primary dark:text-primary-fixed flex justify-between items-center w-full px-6 py-4 flat no shadows z-40">
</header>
<!-- Main Scrollable Canvas -->
<main class="flex-1 overflow-y-auto px-6 py-6 pb-28 space-y-8">
<!-- Hero Section: Profile & Service Summary -->
<section class="bg-surface-container-lowest border border-outline-variant rounded-xl p-6 flex flex-col md:flex-row gap-6 relative overflow-hidden">
<!-- Decorative Accent -->
<div class="absolute top-0 right-0 w-32 h-32 bg-primary-container opacity-10 rounded-bl-full pointer-events-none"></div>
<!-- Profile Identity -->
<div class="flex items-center gap-5 md:w-1/3">
<div class="w-16 h-16 rounded-full bg-primary flex items-center justify-center text-on-primary font-headline text-headline-sm shadow-sm">
                    JD
                </div>
<div>
<h2 class="text-headline-sm font-headline text-on-background">Jane Doe</h2>
<p class="text-body-md text-on-surface-variant">jane.doe@example.com</p>
</div>
</div>
<!-- Service Summary Data -->
<div class="flex-1 grid grid-cols-3 gap-4 border-t md:border-t-0 md:border-l border-outline-variant pt-6 md:pt-0 md:pl-6 relative z-10">
<div class="flex flex-col justify-center">
<p class="text-label-md font-label text-on-surface-variant uppercase tracking-wider text-[11px] mb-1">Total Hours</p>
<p class="text-data-lg font-data-lg text-primary">42.5</p>
</div>
<div class="flex flex-col justify-center">
<p class="text-label-md font-label text-on-surface-variant uppercase tracking-wider text-[11px] mb-1">Sessions</p>
<p class="text-data-lg font-data-lg text-on-background">18</p>
</div>
<div class="flex flex-col justify-center">
<p class="text-label-md font-label text-on-surface-variant uppercase tracking-wider text-[11px] mb-1 text-secondary">Approved</p>
<p class="text-data-lg font-data-lg text-secondary">36.0</p>
</div>
</div>
</section>
<!-- Bento Grid: Management Sections -->
<section class="grid grid-cols-1 md:grid-cols-2 gap-4">
<!-- Records Card -->
<div class="bg-surface-container-lowest border border-outline-variant rounded-lg p-5 flex flex-col">
<div class="flex items-center gap-2 mb-4">
<span class="material-symbols-outlined text-primary text-[20px]">folder</span>
<h3 class="text-headline-sm font-headline text-on-background">Records</h3>
</div>
<ul class="space-y-1 flex-1">
<li class="hidden">
<button class="w-full flex justify-between items-center px-3 py-3 rounded-md hover:bg-surface-container-low transition-colors text-left focus:outline-none focus:ring-2 focus:ring-primary/50">
<span class="font-body text-body-md text-on-background">Export Service Record</span>
<span class="material-symbols-outlined text-on-surface-variant text-[20px]">download</span>
</button>
</li>
<li class="">
<button class="w-full flex justify-between items-center px-3 py-3 rounded-md hover:bg-surface-container-low transition-colors text-left focus:outline-none focus:ring-2 focus:ring-primary/50">
<span class="font-body text-body-md text-on-background">Approval History</span>
<span class="material-symbols-outlined text-on-surface-variant text-[20px]">history</span>
</button>
</li>
</ul>
</div>
<!-- Shop Card -->
<div class="hidden bg-surface-container-lowest border border-outline-variant rounded-lg p-5 flex flex-col">
<div class="flex items-center gap-2 mb-4">
<span class="material-symbols-outlined text-primary text-[20px]">shopping_bag</span>
<h3 class="text-headline-sm font-headline text-on-background">Shop</h3>
</div>
<ul class="space-y-1 flex-1">
<li class="">
<button class="w-full flex justify-between items-center px-3 py-3 rounded-md hover:bg-surface-container-low transition-colors text-left focus:outline-none focus:ring-2 focus:ring-primary/50">
<span class="font-body text-body-md text-on-background">Order History</span>
<span class="material-symbols-outlined text-on-surface-variant text-[20px]">receipt_long</span>
</button>
</li>
<li class="">
<button class="w-full flex justify-between items-center px-3 py-3 rounded-md hover:bg-surface-container-low transition-colors text-left focus:outline-none focus:ring-2 focus:ring-primary/50">
<span class="font-body text-body-md text-on-background">Donation History</span>
<span class="material-symbols-outlined text-on-surface-variant text-[20px]">volunteer_activism</span>
</button>
</li>
</ul>
</div>
<!-- Preferences Card (Full Width Span) -->
<div class="md:col-span-2 bg-surface-container-lowest border border-outline-variant rounded-lg p-5">
<div class="flex items-center gap-2 mb-4">
<span class="material-symbols-outlined text-primary text-[20px]">tune</span>
<h3 class="text-headline-sm font-headline text-on-background">Preferences</h3>
</div>
<div class="grid grid-cols-1 md:grid-cols-2 gap-3">
<button class="flex justify-between items-center p-4 border border-outline-variant rounded-md hover:bg-surface-container-low transition-colors text-left focus:outline-none focus:ring-2 focus:ring-primary/50">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-on-surface-variant text-[20px]">notifications</span>
<span class="font-body text-body-md text-on-background">Notifications</span>
</div>
<span class="material-symbols-outlined text-on-surface-variant text-[20px]">chevron_right</span>
</button>
<button class="flex justify-between items-center p-4 border border-outline-variant rounded-md hover:bg-surface-container-low transition-colors text-left focus:outline-none focus:ring-2 focus:ring-primary/50">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-on-surface-variant text-[20px]">security</span>
<span class="font-body text-body-md text-on-background">Privacy</span>
</div>
<span class="material-symbols-outlined text-on-surface-variant text-[20px]">chevron_right</span>
</button>
</div>
</div>
</section>
<!-- System Actions -->
<section class="flex flex-col gap-3 pt-4">
<button class="w-full bg-surface border border-outline-variant text-on-background font-label text-label-md py-4 rounded-md flex justify-center items-center gap-2 hover:bg-surface-container-low transition-colors focus:outline-none focus:ring-2 focus:ring-primary/50">
<span class="material-symbols-outlined text-[20px]">settings</span>
                Settings
            </button>
<button class="w-full bg-surface-container-high text-primary font-label text-label-md py-4 rounded-md flex justify-center items-center gap-2 hover:bg-surface-variant/50 transition-colors focus:outline-none focus:ring-2 focus:ring-primary/50">
<span class="material-symbols-outlined text-[20px]">logout</span>
                Log Out
            </button>
<button class="w-full text-error font-label text-label-md py-3 rounded-md flex justify-center items-center gap-2 hover:bg-error-container/10 transition-colors focus:outline-none focus:ring-2 focus:ring-error/50">
<span class="material-symbols-outlined text-[20px]">delete_forever</span>
                Delete Account
            </button></section>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 w-full z-50 h-20 rounded-t-xl bg-surface-container dark:bg-inverse-surface border-t border-outline-variant dark:border-outline shadow-lg flex justify-around items-center px-2 pb-safe md:hidden">
<button class="flex flex-col items-center justify-center text-on-surface-variant dark:text-outline-variant hover:bg-surface-variant/50 w-16 h-14 rounded-xl cursor-pointer transition-colors focus:outline-none">
<span class="material-symbols-outlined mb-1">grid_view</span>
<span class="text-[10px] font-label">Feed</span>
</button>
<button class="flex flex-col items-center justify-center text-on-surface-variant dark:text-outline-variant hover:bg-surface-variant/50 w-16 h-14 rounded-xl cursor-pointer transition-colors focus:outline-none">
<span class="material-symbols-outlined mb-1">map</span>
<span class="text-[10px] font-label">Explore</span>
</button>
<button class="flex flex-col items-center justify-center text-on-surface-variant dark:text-outline-variant hover:bg-surface-variant/50 w-16 h-14 rounded-xl cursor-pointer transition-colors focus:outline-none">
<span class="material-symbols-outlined mb-1 text-primary text-[28px]">add_circle</span>
<span class="text-[10px] font-label">Track</span>
</button>
<button class="flex flex-col items-center justify-center text-on-surface-variant dark:text-outline-variant hover:bg-surface-variant/50 w-16 h-14 rounded-xl cursor-pointer transition-colors focus:outline-none">
<span class="material-symbols-outlined mb-1">eco</span>
<span class="text-[10px] font-label">Impact</span>
</button>
<!-- Active Profile Tab -->
<button class="flex flex-col items-center justify-center text-primary dark:text-primary-fixed-dim bg-primary-container/20 rounded-full px-4 py-1 hover:bg-surface-variant/50 w-16 h-14 cursor-pointer scale-95 transition-transform duration-150 focus:outline-none">
<span class="material-symbols-outlined mb-1" style="font-variation-settings: 'FILL' 1;">person</span>
<span class="text-[10px] font-label font-bold">Profile</span>
</button>
</nav>


</body></html>
