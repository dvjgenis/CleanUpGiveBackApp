<!DOCTYPE html><html lang="en"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>Export Service Record</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&amp;family=Noto+Sans:wght@400;600&amp;family=Sanchez:wght@400;600;700&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "surface-variant": "#e5e2e1",
                    "surface-dim": "#dcd9d9",
                    "on-primary-container": "#f7fff2",
                    "tertiary-fixed-dim": "#ffb2bf",
                    "tertiary-container": "#c64869",
                    "on-surface-variant": "#3e4a3d",
                    "surface-container-low": "#f6f3f2",
                    "surface-container": "#f0edec",
                    "on-primary": "#ffffff",
                    "surface-container-highest": "#e5e2e1",
                    "primary": "#006b2c",
                    "outline": "#6e7a6c",
                    "on-secondary-fixed": "#2a1800",
                    "on-error-container": "#93000a",
                    "tertiary-fixed": "#ffd9de",
                    "on-secondary": "#ffffff",
                    "error": "#ba1a1a",
                    "background": "#fcf9f8",
                    "on-tertiary-fixed-variant": "#89173c",
                    "on-primary-fixed-variant": "#005320",
                    "surface-bright": "#fcf9f8",
                    "secondary-container": "#fcab29",
                    "surface": "#fcf9f8",
                    "outline-variant": "#bdcaba",
                    "inverse-on-surface": "#f3f0ef",
                    "surface-container-lowest": "#ffffff",
                    "secondary-fixed-dim": "#ffb957",
                    "secondary-fixed": "#ffddb5",
                    "inverse-surface": "#313030",
                    "on-tertiary-fixed": "#3f0016",
                    "on-tertiary": "#ffffff",
                    "inverse-primary": "#66de7f",
                    "primary-container": "#008739",
                    "primary-fixed": "#83fb98",
                    "error-container": "#ffdad6",
                    "on-secondary-fixed-variant": "#643f00",
                    "on-tertiary-container": "#fffbff",
                    "on-primary-fixed": "#002109",
                    "on-surface": "#1c1b1b",
                    "on-error": "#ffffff",
                    "surface-container-high": "#eae7e7",
                    "on-secondary-container": "#694300",
                    "secondary": "#835400",
                    "tertiary": "#a62f51",
                    "primary-fixed-dim": "#66de7f",
                    "on-background": "#1c1b1b",
                    "surface-tint": "#006e2d"
            },
            "borderRadius": {
                    "DEFAULT": "0.5rem",
                    "sm": "0.25rem",
                    "md": "0.75rem",
                    "lg": "1rem",
                    "xl": "1.5rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Sanchez", "serif"],
                    "display": ["Sanchez", "serif"],
                    "body": ["Noto Sans", "sans-serif"],
                    "label": ["Noto Sans", "sans-serif"],
                    "data": ["JetBrains Mono", "monospace"]
            }
          },
        },
      }
    </script>
<style>
        /* Custom styles for hidden inputs */
        input[type="radio"]:checked + div {
            border-color: #006b2c;
            background-color: #f7fff2;
        }
        input[type="radio"]:checked + div .radio-icon {
            color: #006b2c;
        }
        
        .status-checkbox:checked + div {
            border-color: #006b2c;
            background-color: #f0edec;
        }
        .status-checkbox:checked + div .check-icon {
            opacity: 1;
        }
        
        /* Minimal Date Input Styling */
        input[type="date"]::-webkit-calendar-picker-indicator {
            opacity: 0.5;
            cursor: pointer;
        }
    </style>
</head>
<body class="bg-background text-on-surface font-body antialiased min-h-screen flex flex-col selection:bg-primary-container selection:text-on-primary-container">
<!-- TopAppBar (From JSON, modified content for specific page intent) -->
<header class="w-full top-0 sticky bg-surface border-b border-outline-variant flex items-center justify-between px-6 py-4 z-40 transition-colors">
<button aria-label="Go back" class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-surface-container-low text-primary active:scale-95 duration-200 transition-all focus:outline-none focus:ring-2 focus:ring-primary">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">arrow_back</span>
</button>
<!-- JSON mandates 'Impact & Action' for TopAppBar headline, but specific task pages usually override this. Using brand anchor as requested by JSON strictly. -->
<h1 class="font-headline text-headline-sm font-semibold text-primary">Export Service Record</h1>
<div class="w-10"></div> <!-- Spacer to center title -->
</header>
<main class="flex-grow w-full max-w-2xl mx-auto px-6 pt-8 pb-32 flex flex-col gap-8">
<!-- Page Header -->

<form class="flex flex-col gap-8" id="exportForm">
<!-- Date Range Section -->
<section class="bg-surface-container-lowest border border-outline-variant rounded-xl p-5 shadow-sm flex flex-col gap-4">
<div class="flex items-center gap-2 text-on-surface">
<span class="material-symbols-outlined text-outline">calendar_month</span>
<h3 class="font-headline text-headline-sm">Timeframe</h3>
</div>
<div class="grid grid-cols-1 md:grid-cols-2 gap-4">
<div class="flex flex-col gap-1.5">
<label class="font-label text-label-md text-on-surface-variant" for="startDate">Start Date</label>
<div class="relative">
<input class="w-full bg-surface-container-low border border-outline-variant rounded-lg px-4 py-3 font-data text-sm text-on-surface focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-colors" id="startDate" name="startDate" required="" type="date">
</div>
</div>
<div class="flex flex-col gap-1.5">
<label class="font-label text-label-md text-on-surface-variant" for="endDate">End Date</label>
<div class="relative">
<input class="w-full bg-surface-container-low border border-outline-variant rounded-lg px-4 py-3 font-data text-sm text-on-surface focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-colors" id="endDate" name="endDate" required="" type="date">
</div>
</div>
</div>
</section>
<!-- Status Inclusion Section -->
<section class="bg-surface-container-lowest border border-outline-variant rounded-xl p-5 shadow-sm flex flex-col gap-4">
<div class="flex items-center gap-2 text-on-surface">
<span class="material-symbols-outlined text-outline">fact_check</span>
<h3 class="font-headline text-headline-sm">Include Statuses</h3>
</div>
<p class="text-sm text-on-surface-variant mb-1">Select which session records to include in your export.</p>
<div class="flex flex-col gap-3">
<!-- Approved -->
<label class="relative flex cursor-pointer group">
<input checked="" class="peer sr-only status-checkbox" name="status" type="checkbox" value="approved">
<div class="w-full flex items-center justify-between p-4 rounded-lg border border-outline-variant hover:bg-surface-container-low transition-colors group-active:scale-[0.99] duration-150">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1;">check_circle</span>
<span class="font-label text-label-md text-on-surface">Approved Sessions</span>
</div>
<span class="material-symbols-outlined opacity-0 check-icon text-primary transition-opacity" style="font-variation-settings: 'FILL' 1;">check_box</span>
</div>
</label>
<!-- Under Review -->
<label class="relative flex cursor-pointer group">
<input checked="" class="peer sr-only status-checkbox" name="status" type="checkbox" value="review">
<div class="w-full flex items-center justify-between p-4 rounded-lg border border-outline-variant hover:bg-surface-container-low transition-colors group-active:scale-[0.99] duration-150">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-secondary-container" style="font-variation-settings: 'FILL' 1;">pending</span>
<span class="font-label text-label-md text-on-surface">Under Review</span>
</div>
<span class="material-symbols-outlined opacity-0 check-icon text-primary transition-opacity" style="font-variation-settings: 'FILL' 1;">check_box</span>
</div>
</label>
<!-- Not Approved -->
<label class="relative flex cursor-pointer group">
<input class="peer sr-only status-checkbox" name="status" type="checkbox" value="rejected">
<div class="w-full flex items-center justify-between p-4 rounded-lg border border-outline-variant hover:bg-surface-container-low transition-colors group-active:scale-[0.99] duration-150">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-error" style="font-variation-settings: 'FILL' 1;">cancel</span>
<span class="font-label text-label-md text-on-surface">Not Approved</span>
</div>
<span class="material-symbols-outlined opacity-0 check-icon text-primary transition-opacity" style="font-variation-settings: 'FILL' 1;">check_box</span>
</div>
</label>
</div>
</section>
<!-- Format Section -->
<section class="bg-surface-container-lowest border border-outline-variant rounded-xl p-5 shadow-sm flex flex-col gap-4">
<div class="flex items-center gap-2 text-on-surface">
<span class="material-symbols-outlined text-outline">file_present</span>
<h3 class="font-headline text-headline-sm">File Format</h3>
</div>
<div class="grid grid-cols-2 gap-4 mt-2">
<label class="cursor-pointer relative">
<input checked="" class="sr-only" name="format" type="radio" value="pdf">
<div class="flex flex-col items-center justify-center p-6 border-2 border-outline-variant rounded-xl hover:bg-surface-container-low transition-all duration-200">
<span class="material-symbols-outlined text-4xl mb-2 radio-icon text-on-surface-variant transition-colors" style="font-variation-settings: 'FILL' 0;">picture_as_pdf</span>
<span class="font-label text-label-md font-bold">PDF Document</span>
<span class="text-xs text-on-surface-variant mt-1 text-center">Best for sharing &amp; printing</span>
</div>
</label>
<label class="cursor-pointer relative">
<input class="sr-only" name="format" type="radio" value="csv">
<div class="flex flex-col items-center justify-center p-6 border-2 border-outline-variant rounded-xl hover:bg-surface-container-low transition-all duration-200">
<span class="material-symbols-outlined text-4xl mb-2 radio-icon text-on-surface-variant transition-colors" style="font-variation-settings: 'FILL' 0;">table_chart</span>
<span class="font-label text-label-md font-bold">CSV Data</span>
<span class="text-xs text-on-surface-variant mt-1 text-center">Best for spreadsheets</span>
</div>
</label>
</div>
</section>
</form>
</main>
<!-- Fixed Action Bottom Bar -->
<div class="fixed bottom-0 left-0 w-full bg-surface border-t border-outline-variant px-6 py-4 pb-safe flex justify-center z-40">
<button class="w-full max-w-2xl bg-primary text-on-primary font-label text-label-md font-bold py-4 rounded-full flex items-center justify-center gap-2 hover:bg-primary-container hover:text-on-primary-container transition-all active:scale-[0.98] duration-150 shadow-sm" form="exportForm" type="submit">
<span class="material-symbols-outlined">download</span>
            Export Record
        </button>
</div>
<!-- Note: BottomNavBar is intentionally suppressed as this is a task-focused, linear flow (Export) representing a temporary departure from global navigation. -->
<script>
        // Set default dates for the timeframe to last 30 days
        document.addEventListener('DOMContentLoaded', () => {
            const today = new Date();
            const thirtyDaysAgo = new Date(today);
            thirtyDaysAgo.setDate(today.getDate() - 30);
            
            const formatDate = (date) => date.toISOString().split('T')[0];
            
            document.getElementById('endDate').value = formatDate(today);
            document.getElementById('startDate').value = formatDate(thirtyDaysAgo);
            
            // Basic form submission simulation
            document.getElementById('exportForm').addEventListener('submit', (e) => {
                e.preventDefault();
                const btn = document.querySelector('button[type="submit"]');
                const originalText = btn.innerHTML;
                
                btn.innerHTML = `<span class="material-symbols-outlined animate-spin">sync</span> Generating...`;
                btn.classList.add('opacity-80', 'cursor-not-allowed');
                
                setTimeout(() => {
                    btn.innerHTML = `<span class="material-symbols-outlined">check</span> Export Complete`;
                    btn.classList.replace('bg-primary', 'bg-surface-tint');
                    
                    setTimeout(() => {
                        btn.innerHTML = originalText;
                        btn.classList.remove('opacity-80', 'cursor-not-allowed');
                        btn.classList.replace('bg-surface-tint', 'bg-primary');
                    }, 2000);
                }, 1500);
            });
        });
    </script>


</body></html>
