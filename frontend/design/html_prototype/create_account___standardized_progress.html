<body class="bg-background text-on-background font-body min-h-screen flex flex-col items-center selection:bg-primary-container selection:text-on-primary-container">
<!-- Transactional Screen: Navigation Shell Suppressed -->
<main class="w-full max-w-md px-margin-side pt-12 pb-8 flex flex-col grow">
<!-- Back Action & Progress Container -->
<div class="flex flex-col gap-stack-lg mb-8">

<!-- Progress Indicator -->
<div class="flex gap-2 w-full items-center">
<div aria-label="Step 1 active" class="h-2 flex-1 bg-primary rounded-full transition-all duration-300"></div>
<div class="h-2 flex-1 bg-surface-variant rounded-full transition-all duration-300"></div>
<div class="h-2 flex-1 bg-surface-variant rounded-full transition-all duration-300"></div>
</div>
</div>
<!-- Header -->
<div class="mb-10">
<h1 class="font-headline text-display-lg text-on-surface">Create your account</h1>
</div>
<!-- Form -->
<form class="flex flex-col gap-6 w-full flex-grow">
<!-- Full Name Field -->
<div class="flex flex-col gap-2">
<label class="font-label text-label-md text-on-surface" for="fullName">Full Name</label>
<div class="relative">
<input class="w-full bg-surface border border-outline-variant rounded-lg px-4 py-3 font-body text-body-md text-on-surface placeholder:text-on-surface-variant focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all shadow-sm" id="fullName" name="fullName" placeholder="Jane Doe" type="text">
</div>
</div>
<!-- Email Field -->
<div class="flex flex-col gap-2">
<label class="font-label text-label-md text-on-surface" for="email">Email</label>
<div class="relative">
<input class="w-full bg-surface border border-outline-variant rounded-lg px-4 py-3 font-body text-body-md text-on-surface placeholder:text-on-surface-variant focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all shadow-sm" id="email" name="email" placeholder="jane@example.com" type="email">
</div>
</div>
<!-- Password Field -->
<div class="flex flex-col gap-2">
<label class="font-label text-label-md text-on-surface" for="password">Password</label>
<div class="relative flex items-center">
<input class="w-full bg-surface border border-outline-variant rounded-lg px-4 py-3 pr-12 font-body text-body-md text-on-surface placeholder:text-on-surface-variant focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all shadow-sm" id="password" name="password" placeholder="••••••••" type="password">
<button aria-label="Toggle password visibility" class="absolute right-3 p-1 text-on-surface-variant hover:text-on-surface transition-colors flex items-center justify-center" type="button">
<span class="material-symbols-outlined" data-icon="visibility_off">visibility_off</span>
</button>
</div>
</div>
<!-- Spacer to push button to bottom if needed, though gap handles most -->
<div class="flex-grow"></div>
<!-- Primary Action Button -->
<div class="flex gap-4 mt-4">
<button class="flex-1 bg-surface-container text-on-surface rounded-lg py-4 px-6 font-label text-label-md shadow-sm hover:bg-surface-container-high transition-all flex items-center justify-center active:scale-[0.98]" type="button" onclick="window.location.href='account_details___standardized_progress.html'">
Previous
</button>
<button class="flex-1 bg-primary text-on-primary rounded-lg py-4 px-6 font-label text-label-md shadow-sm hover:bg-primary-container hover:text-on-primary-container active:scale-[0.98] transition-all flex items-center justify-center gap-2" type="submit" onclick="window.location.href='welcome___standardized_progress.html'">
Continue
<span class="material-symbols-outlined text-[20px]" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
</form>
</main>
<script>
        // Simple password toggle logic
        document.addEventListener('DOMContentLoaded', () => {
            const toggleBtn = document.querySelector('button[aria-label="Toggle password visibility"]');
            const passwordInput = document.getElementById('password');
            const iconSpan = toggleBtn.querySelector('.material-symbols-outlined');

            if (toggleBtn && passwordInput && iconSpan) {
                toggleBtn.addEventListener('click', () => {
                    const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                    passwordInput.setAttribute('type', type);
                    
                    if (type === 'text') {
                        iconSpan.textContent = 'visibility';
                        iconSpan.setAttribute('data-icon', 'visibility');
                    } else {
                        iconSpan.textContent = 'visibility_off';
                        iconSpan.setAttribute('data-icon', 'visibility_off');
                    }
                });
            }
        });
    </script>
