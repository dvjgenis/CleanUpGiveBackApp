<!DOCTYPE html><html lang="en"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>Notifications - Clean-Up Give Back</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com" rel="preconnect">
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Noto+Sans:wght@400;600&family=Sanchez:wght@400;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
<script id="tailwind-config">
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        colors: {
          "primary": "#009540", "on-primary": "#ffffff", "primary-container": "#008739",
          "on-primary-container": "#f7fff2", "secondary": "#835400", "on-secondary": "#ffffff",
          "secondary-container": "#fcab29", "on-secondary-container": "#694300",
          "error": "#ba1a1a", "on-error": "#ffffff",
          "background": "#fcf9f8", "on-background": "#1c1b1b",
          "surface": "#fcf9f8", "on-surface": "#1c1b1b",
          "surface-variant": "#e5e2e1", "on-surface-variant": "#3e4a3d",
          "surface-container-lowest": "#ffffff", "surface-container-low": "#f6f3f2",
          "surface-container": "#f0edec", "surface-container-high": "#eae7e7",
          "outline": "#6e7a6c", "outline-variant": "#bdcaba",
          "inverse-surface": "#313030", "inverse-on-surface": "#f3f0ef"
        },
        borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
        spacing: { "margin-side": "24px", "stack-sm": "8px", "stack-md": "16px", "stack-lg": "32px" },
        fontFamily: { "headline": ["Sanchez"], "display": ["Sanchez"], "body": ["Noto Sans"], "label": ["Noto Sans"], "data": ["JetBrains Mono"] },
        fontSize: {
          "display-lg": ["34px", { lineHeight: "40px", letterSpacing: "-0.02em", fontWeight: "700" }],
          "body-md": ["16px", { lineHeight: "24px", fontWeight: "400" }],
          "label-md": ["14px", { lineHeight: "20px", letterSpacing: "0.01em", fontWeight: "600" }]
        }
      }
    }
  }
</script>
<style>
  .material-symbols-outlined { font-family: 'Material Symbols Outlined'; font-weight: normal; font-style: normal; font-size: 24px; line-height: 1; letter-spacing: normal; text-transform: none; display: inline-block; white-space: nowrap; direction: ltr; -webkit-font-smoothing: antialiased; }
  body { min-height: max(884px, 100dvh); }
</style>
</head>
<body class="bg-background text-on-background font-body min-h-screen flex flex-col items-center selection:bg-primary-container selection:text-on-primary-container">
<main class="w-full max-w-md px-margin-side pt-12 pb-8 flex flex-col grow">

  <!-- Progress Indicator (Step 3 of 3) -->
  <div class="flex gap-2 w-full items-center mb-10">
    <div aria-label="Step 1 completed" class="h-2 flex-1 bg-primary rounded-full transition-all duration-300"></div>
    <div aria-label="Step 2 completed" class="h-2 flex-1 bg-primary rounded-full transition-all duration-300"></div>
    <div aria-label="Step 3 active" class="h-2 flex-1 bg-primary rounded-full transition-all duration-300"></div>
  </div>

  <!-- Header -->
  <div class="mb-10">
    <h1 class="font-headline text-display-lg text-on-surface">Stay updated</h1>
    <p class="font-body text-body-md text-on-surface-variant mt-2">Get alerts about approvals, events, and photo checkpoints.</p>
  </div>

  <!-- Icon -->
  <div class="flex justify-center mb-10">
    <div class="w-28 h-28 rounded-full bg-primary flex items-center justify-center shadow-sm">
      <span class="material-symbols-outlined text-white text-[56px]" style="font-variation-settings:'FILL' 1,'wght' 400,'GRAD' 0,'opsz' 48;">notifications_active</span>
    </div>
  </div>

  <!-- Feature Grid -->
  <div class="w-full grid grid-cols-2 gap-3">
    <div class="flex items-center gap-3 bg-surface-container p-4 rounded-xl border border-outline-variant">
      <span class="material-symbols-outlined text-primary text-2xl shrink-0" style="font-variation-settings:'FILL' 1;">task_alt</span>
      <span class="font-label text-label-md text-on-surface">Approval Updates</span>
    </div>
    <div class="flex items-center gap-3 bg-surface-container p-4 rounded-xl border border-outline-variant">
      <span class="material-symbols-outlined text-primary text-2xl shrink-0" style="font-variation-settings:'FILL' 1;">event</span>
      <span class="font-label text-label-md text-on-surface">New Events</span>
    </div>
    <div class="flex items-center gap-3 bg-surface-container p-4 rounded-xl border border-outline-variant">
      <span class="material-symbols-outlined text-primary text-2xl shrink-0" style="font-variation-settings:'FILL' 1;">photo_camera</span>
      <span class="font-label text-label-md text-on-surface">Photo Alerts</span>
    </div>
    <div class="flex items-center gap-3 bg-surface-container p-4 rounded-xl border border-outline-variant">
      <span class="material-symbols-outlined text-primary text-2xl shrink-0" style="font-variation-settings:'FILL' 1;">schedule</span>
      <span class="font-label text-label-md text-on-surface">Session Reminders</span>
    </div>
  </div>

  <!-- Spacer -->
  <div class="flex-grow"></div>

  <!-- Primary Buttons -->
  <div class="flex gap-4 mt-4">
    <button class="flex-1 bg-surface-container text-on-surface rounded-lg py-4 px-6 font-label text-label-md shadow-sm hover:bg-surface-container-high transition-all flex items-center justify-center active:scale-[0.97]" type="button">
      Previous
    </button>
    <button class="flex-1 bg-primary text-on-primary rounded-lg py-4 px-6 font-label text-label-md shadow-sm hover:opacity-90 transition-all flex items-center justify-center active:scale-[0.97]" type="button">
      Enable Notifications
    </button>
  </div>

  <!-- Skip -->
  <button class="w-full mt-3 text-on-surface-variant font-label text-label-md py-3 rounded-lg flex justify-center items-center hover:bg-surface-container transition-all active:scale-[0.97]" type="button">
    Not now
  </button>

</main>
</body></html>
