<!DOCTYPE html><html lang="en"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>You're All Set - Clean-Up Give Back</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com" rel="preconnect">
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Noto+Sans:wght@400;600&family=Sanchez:wght@400;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
<script id="tailwind-config">
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        colors: {
          "primary": "#009540", "on-primary": "#ffffff", "primary-container": "#008739",
          "on-primary-container": "#f7fff2",
          "background": "#fcf9f8", "on-background": "#1c1b1b",
          "surface": "#fcf9f8", "on-surface": "#1c1b1b",
          "surface-variant": "#e5e2e1", "on-surface-variant": "#3e4a3d",
          "surface-container-lowest": "#ffffff", "surface-container-low": "#f6f3f2",
          "surface-container": "#f0edec", "surface-container-high": "#eae7e7",
          "outline": "#6e7a6c", "outline-variant": "#bdcaba"
        },
        borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
        spacing: { "margin-side": "24px" },
        fontFamily: { "headline": ["Sanchez"], "body": ["Noto Sans"], "label": ["Noto Sans"] },
        fontSize: {
          "display-lg": ["34px", { lineHeight: "40px", letterSpacing: "-0.02em", fontWeight: "700" }],
          "body-lg": ["18px", { lineHeight: "28px", fontWeight: "400" }],
          "label-md": ["14px", { lineHeight: "20px", letterSpacing: "0.01em", fontWeight: "600" }]
        }
      }
    }
  }
</script>
<style>
  .material-symbols-outlined { font-family: 'Material Symbols Outlined'; font-weight: normal; font-style: normal; font-size: 24px; line-height: 1; letter-spacing: normal; text-transform: none; display: inline-block; white-space: nowrap; direction: ltr; -webkit-font-smoothing: antialiased; }
  body { min-height: max(884px, 100dvh); }
</style>
</head>
<body class="bg-background text-on-background font-body min-h-screen flex flex-col items-center selection:bg-primary-container selection:text-on-primary-container">
<main class="w-full max-w-md px-margin-side pt-12 pb-8 flex flex-col grow">

  <!-- Header -->
  <div class="flex-grow flex flex-col justify-center">
    <div class="w-20 h-20 rounded-full bg-primary flex items-center justify-center mb-8">
      <span class="material-symbols-outlined text-white text-[44px]" style="font-variation-settings:'FILL' 1,'wght' 400,'GRAD' 0,'opsz' 48;">check_circle</span>
    </div>
    <h1 class="font-headline text-display-lg text-on-surface mb-4">You're all set!</h1>
    <p class="font-body text-body-lg text-on-surface-variant">Your Clean-Up Give Back account is ready. Start tracking your sessions and making an impact today.</p>
  </div>

  <!-- Buttons -->
  <div class="flex flex-col gap-3">
    <button class="w-full bg-primary text-on-primary rounded-lg py-4 px-6 font-label text-label-md shadow-sm hover:opacity-90 transition-all flex items-center justify-center active:scale-[0.97]" type="button">
      Start Quick Tour
    </button>
    <button class="w-full bg-surface-container text-on-surface rounded-lg py-4 px-6 font-label text-label-md shadow-sm hover:bg-surface-container-high transition-all flex items-center justify-center active:scale-[0.97]" type="button">
      Start Tracking
    </button>
    <button class="w-full text-on-surface-variant font-label text-label-md py-3 rounded-lg flex justify-center items-center hover:bg-surface-container transition-all active:scale-[0.97]" type="button">
      Go to Home
    </button>
  </div>

</main>
</body></html>
