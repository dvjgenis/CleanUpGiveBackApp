<script>
        // Simple timer logic for interaction demonstration
        let seconds = 20;
        let minutes = 42;
        let hours = 0;
        
        setInterval(() => {
            seconds++;
            if(seconds >= 60) {
                seconds = 0;
                minutes++;
            }
            if(minutes >= 60) {
                minutes = 0;
                hours++;
            }
            
            const display = `${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
            document.getElementById('session-timer').textContent = display;
        }, 1000);
    </script>
